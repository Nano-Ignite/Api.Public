services:
  api.public:
    image: api.public
    hostname: api-public
    restart: on-failure
    ports:
      - 8080:8080
      - 4443:4443
    build:
      context: ../Api.Public
      dockerfile: "Dockerfile.Local"
    volumes:
      - ../:/root/.dotnet/https
    networks:
      - network

  clamav: 
    image: clamav/clamav
    hostname: clamav
    ports:
      - 3310:3310
    networks:
      - network
  
  svc.users:
    image: ghcr.io/krownsoft/svc.users:latest
    hostname: svc-users
    depends_on:
      - eventing
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Data__UseMigrateDatabase: false
      Data__ConnectionString: ${SVC_USERS_CONNECTIONSTRING}
      Security__Jwt__PublicKey: 
      Security__Jwt__PrivateKey: 
    networks:
      - network
    volumes:
      - C:\krown\svc-users:/mnt/svc-users

  svc.places:
    image: ghcr.io/krownsoft/svc.places:latest
    hostname: svc-places
    depends_on:
      - eventing
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Data__UseMigrateDatabase: false
      Data__ConnectionString: ${SVC_PLACES_CONNECTIONSTRING}
      Security__Jwt__PublicKey: 
    networks:
      - network
    volumes:
      - C:\krown\svc-places:/mnt/svc-places

  svc.events:
    image: ghcr.io/krownsoft/svc.events:latest
    hostname: svc-events
    depends_on:
      - eventing
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Data__UseMigrateDatabase: false
      Data__ConnectionString: ${SVC_EVENTS_CONNECTIONSTRING}
      Security__Jwt__PublicKey: 
    networks:
      - network
    volumes:
      - C:\krown\svc-events:/mnt/svc-event

  svc.messaging:
    image: ghcr.io/krownsoft/svc.messaging:latest
    hostname: svc-messaging
    depends_on:
      - eventing
    env_file:
      - .env
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Data__UseMigrateDatabase: false
      Data__ConnectionString: ${SVC_MESSAGING_CONNECTIONSTRING}
      Security__Jwt__PublicKey: 
    networks:
      - network

networks:
  network:
    name: network
    driver: bridge
